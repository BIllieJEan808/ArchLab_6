<VirtualHost *:80>
    # Основные настройки
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # Логирование
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Настройки для фронтенда
    <Directory "/var/www/html">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # Правила для HTML5 History API (если используете роутинг на клиенте)
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Настройки для бэкенда (API)
    Alias /api "/var/www/back"
    <Directory "/var/www/back">
        AllowOverride All
        Options +ExecCGI
        Require all granted

        # Разрешаем обработку PHP
        <FilesMatch \.php$>
            SetHandler application/x-httpd-php
        </FilesMatch>

        # Правила для API
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ api.php [QSA,L]
    </Directory>
</VirtualHost>